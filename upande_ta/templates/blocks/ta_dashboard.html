<div class="ta-dashboard">
  <div class="ta-filters">
    <div class="ta-filter ta-filter--date">
      <label>Date</label>
      <div data-ta-date="date"></div>
    </div>
    <div class="ta-filter" data-ta-filter-wrap="company" style="display:none">
      <label>Company</label>
      <select class="form-control form-control-sm" data-ta-filter="company"><option value="">All</option></select>
    </div>
    <div class="ta-filter" data-ta-filter-wrap="farm" style="display:none">
      <label>Farm</label>
      <select class="form-control form-control-sm" data-ta-filter="farm"><option value="">All</option></select>
    </div>
    <div class="ta-filter" data-ta-filter-wrap="department" style="display:none">
      <label>Department</label>
      <select class="form-control form-control-sm" data-ta-filter="department"><option value="">All</option></select>
    </div>
    <div class="ta-filter" data-ta-filter-wrap="designation" style="display:none">
      <label>Designation</label>
      <select class="form-control form-control-sm" data-ta-filter="designation"><option value="">All</option></select>
    </div>
    <div class="ta-filter" data-ta-filter-wrap="employee" style="display:none">
      <label>Employee</label>
      <select class="form-control form-control-sm" data-ta-filter="employee"><option value="">All</option></select>
    </div>
    <div class="ta-filter ta-filter--clear">
      <label>&nbsp;</label>
      <button class="ta-clear btn btn-sm btn-default" type="button" title="Clear filters">Clear</button>
    </div>
    <div class="ta-controls">
      <label>&nbsp;</label>
      <button class="ta-refresh btn btn-sm btn-primary" title="Refresh">↻</button>
    </div>
  </div>

  <div class="ta-kpis">
    <div class="ta-kpi ta-kpi--in ta-kpi--filter" data-ta-cat="present" title="Show checked-in employees">
      <div class="ta-kpi__label">Check-Ins</div>
      <div class="ta-kpi__value" data-ta="unique_in">—</div>
    </div>
    <div class="ta-kpi ta-kpi--out ta-kpi--filter" data-ta-cat="present" title="Show checked-in employees">
      <div class="ta-kpi__label">Check-Outs</div>
      <div class="ta-kpi__value" data-ta="unique_out">—</div>
    </div>
    <div class="ta-kpi ta-kpi--absent ta-kpi--filter" data-ta-cat="absent" title="Show absent employees">
      <div class="ta-kpi__label">Absent</div>
      <div class="ta-kpi__value" data-ta="absent">—</div>
    </div>
    <div class="ta-kpi ta-kpi--leave ta-kpi--filter" data-ta-cat="leave" title="Show employees on leave">
      <div class="ta-kpi__label">Leaves</div>
      <div class="ta-kpi__value" data-ta="leave">—</div>
    </div>
    <div class="ta-kpi ta-kpi--weekoff ta-kpi--filter" data-ta-cat="weekly_off" title="Show employees on weekly off">
      <div class="ta-kpi__label">Week Off</div>
      <div class="ta-kpi__value" data-ta="weekly_off">—</div>
    </div>
    <div class="ta-kpi ta-kpi--employees">
      <div class="ta-kpi__label">Total Employees</div>
      <div class="ta-kpi__value" data-ta="total_employees">—</div>
    </div>
    <div class="ta-kpi ta-kpi--devices">
      <div class="ta-kpi__label">Devices Online</div>
      <div class="ta-kpi__value"><span data-ta="devices_online">—</span> / <span data-ta="devices_total">—</span></div>
    </div>
  </div>

  <div class="ta-table-wrap">
    <div class="ta-table-title"><span data-ta-table-heading>Check-Ins / Check-Outs</span> <span class="ta-range-label" data-ta="range_label"></span></div>
    <div class="ta-table-scroll">
      <table class="ta-table">
        <thead>
          <tr>
            <th class="ta-col-empno ta-sortable" data-sort="employee_number">Employee # <span class="ta-sort-arrow">↕</span></th>
            <th class="ta-sortable" data-sort="employee_name">Name <span class="ta-sort-arrow">↕</span></th>
            <th class="ta-sortable" data-sort="shift">Shift <span class="ta-sort-arrow">↕</span></th>
            <th class="ta-sortable" data-sort="designation">Designation <span class="ta-sort-arrow">↕</span></th>
            <th class="ta-sortable" data-sort="check_in">Check-In <span class="ta-sort-arrow">↕</span></th>
            <th class="ta-sortable" data-sort="check_out">Check-Out <span class="ta-sort-arrow">↕</span></th>
            <th class="ta-sortable" data-sort="worked_hours">Worked Hours <span class="ta-sort-arrow">↕</span></th>
            <th class="ta-sortable" data-sort="status">Status <span class="ta-sort-arrow">↕</span></th>
          </tr>
        </thead>
        <tbody data-ta-table-body>
          <tr><td colspan="8" class="ta-empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="ta-pager" data-ta-pager hidden>
      <div class="ta-pager__size">
        <label>Rows per page</label>
        <select class="form-control form-control-sm" data-ta-page-size>
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
      <div class="ta-pager__info" data-ta-page-info></div>
      <div class="ta-pager__nav">
        <button type="button" class="btn btn-sm btn-default" data-ta-page-first title="First">«</button>
        <button type="button" class="btn btn-sm btn-default" data-ta-page-prev title="Previous">‹</button>
        <button type="button" class="btn btn-sm btn-default" data-ta-page-next title="Next">›</button>
        <button type="button" class="btn btn-sm btn-default" data-ta-page-last title="Last">»</button>
      </div>
    </div>
  </div>

  <div class="ta-footer">
    <span class="ta-updated">Updated <span data-ta="updated_at">—</span></span>
  </div>

  <div class="ta-modal" data-ta-modal hidden>
    <div class="ta-modal__box">
      <div class="ta-modal__head">
        <div class="ta-modal__headinfo">
          <div class="ta-modal__title" data-tam="name"></div>
          <div class="ta-modal__sub" data-tam="sub"></div>
          <div class="ta-modal__controls">
            <div class="ta-modal__range">
              <span class="ta-modal__rf">From <span class="ta-modal__rfctrl" data-tam="from-wrap"></span></span>
              <span class="ta-modal__rf">To <span class="ta-modal__rfctrl" data-tam="to-wrap"></span></span>
            </div>
            <div class="ta-modal__tiles" data-tam="tiles"></div>
          </div>
        </div>
        <button type="button" class="ta-modal__x" data-tam="close" title="Close">×</button>
      </div>
      <div class="ta-modal__body">
        <div class="ta-mgrid-wrap"><table class="ta-mgrid" data-tam="grid"></table></div>
      </div>
    </div>
  </div>
</div>
