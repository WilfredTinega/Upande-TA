name: Semantic Commits

# Lints EVERY commit title in the PR as a Conventional Commit, exactly like
# ERPNext's semantic-commits.yml. semantic-release reads these commit messages
# on `main` to compute the next version, so each commit must be conventional
# (fix:, feat:, chore:, ...). Prefer rebase-merging the PR to preserve them.

on:
  pull_request: {}

permissions:
  contents: read

concurrency:
  group: commitcheck-upande-ta-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Check Commit Titles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Check commit titles
        run: |
          npm install @commitlint/cli @commitlint/config-conventional
          npx commitlint --verbose --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
