name: Generate Semantic Release

on:
  push:
    branches:
      - main

# Uses the auto-provided GITHUB_TOKEN — no manual secret setup required.
# NOTE: if `main` is a protected branch, GITHUB_TOKEN cannot push the version
# bump commit. In that case create a PAT secret named RELEASE_TOKEN (repo +
# workflow scopes) and swap the two GITHUB_TOKEN lines below to secrets.RELEASE_TOKEN.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Entire Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup dependencies
        run: |
          npm install @semantic-release/git @semantic-release/exec --no-save

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: "Upande Release Bot"
          GIT_AUTHOR_EMAIL: "info@upande.com"
          GIT_COMMITTER_NAME: "Upande Release Bot"
          GIT_COMMITTER_EMAIL: "info@upande.com"
        run: npx semantic-release
