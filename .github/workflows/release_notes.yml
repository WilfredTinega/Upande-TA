# This action:
#   1. Generates release notes using the GitHub API.
#   2. Strips housekeeping commits (chore/ci/test/docs/style) and "by @mergify"
#      attribution from the notes.
#   3. Updates the release body with the cleaned notes.
#
# Runs automatically when a release is published, or on demand via
# "Run workflow" (workflow_dispatch) for a given tag.

name: "Release Notes"

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag of release like v1.2.0"
        required: true
        type: string
  release:
    types: [released]

permissions:
  contents: write

jobs:
  regen-notes:
    name: "Regenerate release notes"
    runs-on: ubuntu-latest
    steps:
      - name: Update notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}
        run: |
          NEW_NOTES=$(gh api --method POST -H "Accept: application/vnd.github+json" \
            /repos/$REPO/releases/generate-notes -f tag_name="$RELEASE_TAG" \
            | jq -r '.body' \
            | sed -E '/^\* (chore|ci|test|docs|style)/d' \
            | sed -E 's/by @mergify //')
          RELEASE_ID=$(gh api -H "Accept: application/vnd.github+json" \
            /repos/$REPO/releases/tags/$RELEASE_TAG | jq -r '.id')
          gh api --method PATCH -H "Accept: application/vnd.github+json" \
            /repos/$REPO/releases/$RELEASE_ID -f body="$NEW_NOTES"
